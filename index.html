<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');

* { box-sizing: border-box; }
html, body { margin:0; padding:0; }
.app, .app * { box-sizing: border-box; }
.app {
  --bg:#F4F7F4; --surface:#FFFFFF; --surface-soft:#EDF2EE; --border:#DCE5DF;
  --ink:#26312B; --ink-soft:#66766D;
  --focus:#5B6EF0; --focus-soft:#E7E9FD;
  --capture:#F4B942; --capture-soft:#FDF1D6;
  --success:#3FAE79; --success-soft:#DEF5EA;
  --warm:#FF8A65;
  --radius:16px; --radius-sm:10px;
  --font-display:'Fredoka', sans-serif; --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
  display:flex; min-height:100vh; background:var(--bg); color:var(--ink); font-family:var(--font-body);
}
.app input, .app select, .app button { font: inherit; }
.app h1, .app h2, .app h3, .app p { margin:0; }
.app button:focus-visible, .app input:focus-visible, .app select:focus-visible { outline:2px solid var(--focus); outline-offset:2px; }
.app-loading { align-items:center; justify-content:center; }

.rail { display:flex; flex-direction:column; gap:6px; width:180px; flex-shrink:0; padding:24px 12px; border-right:1px solid var(--border); background:var(--surface); }
.rail-btn { display:flex; align-items:center; gap:10px; padding:10px 12px; border:none; background:transparent; border-radius:var(--radius-sm); font-family:var(--font-body); font-weight:600; font-size:14px; color:var(--ink-soft); cursor:pointer; position:relative; text-align:left; }
.rail-btn:hover { background:var(--surface-soft); color:var(--ink); }
.rail-btn.is-active { background:var(--focus-soft); color:var(--focus); }
.rail-badge { margin-left:auto; background:var(--capture); color:#4a3400; font-family:var(--font-mono); font-size:11px; padding:1px 6px; border-radius:999px; }

.main { flex:1; min-width:0; padding:32px 40px 60px; max-width:920px; margin:0 auto; width:100%; }

.topbar { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
.topbar h1 { font-family:var(--font-display); font-size:28px; font-weight:600; margin-bottom:2px; }
.topbar-date { color:var(--ink-soft); font-size:14px; }
.topbar-stat { display:flex; align-items:center; gap:6px; background:var(--success-soft); color:var(--success); font-weight:600; font-size:13px; padding:6px 12px; border-radius:999px; white-space:nowrap; }

.now-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:32px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:8px; margin-bottom:24px; }
.now-label { font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); }
.ring-wrap { position:relative; display:flex; align-items:center; justify-content:center; margin:8px 0; }
.ring-center { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-progress { transition: stroke-dashoffset .6s ease; }
.now-ring-time { font-family:var(--font-mono); font-size:30px; font-weight:600; }
.now-ring-sub { font-size:12px; color:var(--ink-soft); }
.now-title { font-family:var(--font-display); font-size:22px; font-weight:600; margin-top:6px; }
.now-meta { color:var(--ink-soft); font-size:14px; }
.now-actions { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; justify-content:center; }
.now-empty-text { font-family:var(--font-display); font-size:19px; margin-top:4px; }
.now-empty-sub { color:var(--ink-soft); font-size:14px; margin-top:2px; }

.section-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
.now-priorities, .now-timeline { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px 22px; margin-bottom:20px; }
.now-priorities h3, .now-timeline h3 { font-family:var(--font-display); font-size:16px; margin-bottom:10px; }
.priority-note { font-size:12px; color:var(--warm); font-weight:600; }
.muted { color:var(--ink-soft); font-size:14px; margin-bottom:12px; }

.priority-list, .task-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.task-row { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-sm); background:var(--surface-soft); }
.task-row.is-done .task-title { text-decoration:line-through; color:var(--ink-soft); }
.task-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--border); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--success); flex-shrink:0; padding:0; }
.task-row.is-done .task-check { background:var(--success-soft); border-color:var(--success); }
.task-time { font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); min-width:64px; }
.cat-dot { border-radius:50%; flex-shrink:0; display:inline-block; }
.task-title { flex:1; display:flex; align-items:center; gap:4px; font-size:14px; font-weight:500; text-align:left; min-width:0; }
.recur-icon { color:var(--ink-soft); flex-shrink:0; }
.task-duration { font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); }
.task-star { background:none; border:none; cursor:pointer; color:var(--ink-soft); padding:2px; display:flex; }
.task-star.is-active { color:var(--capture); }
.task-delete { background:none; border:none; cursor:pointer; color:var(--ink-soft); padding:2px; display:flex; opacity:.6; }
.task-delete:hover { opacity:1; color:var(--warm); }
.delete-confirm { display:flex; align-items:center; gap:4px; flex-shrink:0; }

.btn { display:inline-flex; align-items:center; gap:6px; font-family:var(--font-body); font-weight:600; font-size:13px; padding:9px 16px; border-radius:999px; border:1px solid transparent; cursor:pointer; }
.btn-primary { background:var(--focus); color:#fff; }
.btn-primary:hover { background:#4a5de0; }
.btn-ghost { background:var(--surface); color:var(--ink); border-color:var(--border); }
.btn-ghost:hover { background:var(--surface-soft); }
.btn-success { background:var(--success); color:#fff; }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-chip { background:var(--surface-soft); color:var(--ink-soft); border-radius:999px; padding:7px 14px; font-size:13px; }
.btn-chip.is-active { background:var(--focus); color:#fff; }

.quick-add { display:flex; flex-direction:column; gap:10px; margin-top:6px; }
.qa-title { font-size:14px; padding:10px 14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); width:100%; }
.qa-row { display:flex; flex-wrap:wrap; gap:8px; }
.qa-row-meta { align-items:center; }
.qa-input { font-size:13px; padding:7px 10px; border-radius:8px; border:1px solid var(--border); background:var(--surface); }
.qa-submit { margin-left:auto; }

.cat-picker { display:flex; flex-wrap:wrap; gap:6px; }
.cat-swatch { display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--border); background:var(--surface); font-size:12px; font-weight:600; color:var(--ink-soft); cursor:pointer; }
.cat-swatch.is-active { background:var(--sw-soft); border-color:var(--sw-color); color:var(--ink); }

.recur-picker { display:flex; flex-direction:column; gap:8px; padding:10px 12px; background:var(--surface-soft); border-radius:var(--radius-sm); width:100%; }
.recur-options { display:flex; flex-wrap:wrap; gap:6px; }
.recur-days { display:flex; gap:4px; flex-wrap:wrap; }
.day-chip { width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:var(--surface); font-size:12px; font-weight:600; color:var(--ink-soft); cursor:pointer; }
.day-chip.is-active { background:var(--focus); border-color:var(--focus); color:#fff; }
.recur-hint { font-size:12px; color:var(--ink-soft); }
.recur-end { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink-soft); }
.recur-end input { padding:6px 8px; border-radius:8px; border:1px solid var(--border); font-size:12px; }

.view-intro { color:var(--ink-soft); font-size:14px; margin-bottom:14px; max-width:52ch; }
.dump-list { display:flex; flex-direction:column; gap:8px; margin-top:22px; }
.dump-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; }
.dump-row { display:flex; align-items:center; gap:10px; }
.dump-title { flex:1; font-size:14px; font-weight:500; text-align:left; }
.dump-schedule-form { margin-top:12px; display:flex; flex-direction:column; gap:10px; }

.week-list { display:flex; flex-direction:column; gap:12px; width:100%; }
.week-row { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px 18px; }
.week-row.is-today { border-color:var(--focus); box-shadow:0 0 0 1px var(--focus); }
.week-row-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.week-row-title { display:flex; align-items:baseline; gap:8px; font-family:var(--font-display); }
.week-row-day { font-size:15px; font-weight:600; }
.week-row-date { font-family:var(--font-mono); font-size:12px; color:var(--ink-soft); }
.week-empty { color:var(--ink-soft); font-size:13px; margin:2px 0 4px; }
.week-add-btn { display:flex; align-items:center; gap:4px; background:none; border:1px dashed var(--border); border-radius:999px; padding:6px 12px; font-size:12px; color:var(--ink-soft); cursor:pointer; flex-shrink:0; }
.week-add-form { margin-top:10px; }

.focus-panel { display:flex; flex-direction:column; align-items:center; gap:20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:36px; }
.focus-presets { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center; }
.focus-custom { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--ink-soft); }
.focus-custom input { width:52px; padding:6px; border-radius:8px; border:1px solid var(--border); font-family:var(--font-mono); text-align:center; }
.focus-time { font-family:var(--font-mono); font-size:36px; font-weight:600; }
.focus-done-label { font-size:12px; color:var(--success); font-weight:600; }
.focus-controls { display:flex; gap:10px; }
.focus-link { display:flex; flex-direction:column; align-items:center; gap:8px; font-size:13px; }
.focus-link select { padding:8px 12px; border-radius:8px; border:1px solid var(--border); }

@media (prefers-reduced-motion: reduce) {
  .app .ring-progress { transition:none; }
  .app * { animation:none !important; transition:none !important; }
}

@media (max-width: 760px) {
  .app { flex-direction:column; }
  .rail { flex-direction:row; width:100%; overflow-x:auto; border-right:none; border-bottom:1px solid var(--border); padding:10px; }
  .rail-btn span { display:none; }
  .rail-btn { flex-direction:column; gap:2px; padding:8px 10px; }
  .main { padding:20px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef, useMemo } = React;
const h = React.createElement;

/* ---------------------------------- icons (inline, no external deps) ---------------------------------- */

function Icon(props) {
  const { children, size = 16, fill = "none", ...rest } = props;
  return h("svg", Object.assign({ width: size, height: size, viewBox: "0 0 24 24", fill, stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }, rest), children);
}
const Sun = (p) => h(Icon, p,
  h("circle", { cx: 12, cy: 12, r: 4 }),
  h("line", { x1: 12, y1: 2, x2: 12, y2: 4 }),
  h("line", { x1: 12, y1: 20, x2: 12, y2: 22 }),
  h("line", { x1: 4.22, y1: 4.22, x2: 5.64, y2: 5.64 }),
  h("line", { x1: 18.36, y1: 18.36, x2: 19.78, y2: 19.78 }),
  h("line", { x1: 2, y1: 12, x2: 4, y2: 12 }),
  h("line", { x1: 20, y1: 12, x2: 22, y2: 12 }),
  h("line", { x1: 4.22, y1: 19.78, x2: 5.64, y2: 18.36 }),
  h("line", { x1: 18.36, y1: 5.64, x2: 19.78, y2: 4.22 })
);
const Inbox = (p) => h(Icon, p,
  h("polyline", { points: "22 12 16 12 14 15 10 15 8 12 2 12" }),
  h("path", { d: "M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" })
);
const CalendarDays = (p) => h(Icon, p,
  h("rect", { x: 3, y: 4, width: 18, height: 18, rx: 2 }),
  h("line", { x1: 16, y1: 2, x2: 16, y2: 6 }),
  h("line", { x1: 8, y1: 2, x2: 8, y2: 6 }),
  h("line", { x1: 3, y1: 10, x2: 21, y2: 10 })
);
const TimerIcon = (p) => h(Icon, p,
  h("line", { x1: 10, y1: 2, x2: 14, y2: 2 }),
  h("line", { x1: 12, y1: 14, x2: 15, y2: 11 }),
  h("circle", { cx: 12, cy: 14, r: 8 })
);
const Check = (p) => h(Icon, p, h("polyline", { points: "20 6 9 17 4 12" }));
const Plus = (p) => h(Icon, p, h("line", { x1: 12, y1: 5, x2: 12, y2: 19 }), h("line", { x1: 5, y1: 12, x2: 19, y2: 12 }));
const X = (p) => h(Icon, p, h("line", { x1: 18, y1: 6, x2: 6, y2: 18 }), h("line", { x1: 6, y1: 6, x2: 18, y2: 18 }));
const Star = (p) => h(Icon, p, h("polygon", { points: "12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" }));
const Clock = (p) => h(Icon, p, h("circle", { cx: 12, cy: 12, r: 10 }), h("polyline", { points: "12 6 12 12 16 14" }));
const Play = (p) => h(Icon, p, h("polygon", { points: "5 3 19 12 5 21 5 3" }));
const Pause = (p) => h(Icon, p, h("rect", { x: 6, y: 4, width: 4, height: 16 }), h("rect", { x: 14, y: 4, width: 4, height: 16 }));
const RotateCcw = (p) => h(Icon, p, h("polyline", { points: "1 4 1 10 7 10" }), h("path", { d: "M3.51 15a9 9 0 1 0 2.13-9.36L1 10" }));
const Repeat = (p) => h(Icon, p,
  h("polyline", { points: "17 1 21 5 17 9" }),
  h("path", { d: "M3 11V9a4 4 0 0 1 4-4h14" }),
  h("polyline", { points: "7 23 3 19 7 15" }),
  h("path", { d: "M21 13v2a4 4 0 0 1-4 4H3" })
);

/* ---------------------------------- constants ---------------------------------- */

const STORAGE_KEY = "adhd-planner-tasks-standalone-v1";

const CATEGORIES = [
  { id: "work", label: "Work", color: "#5B6EF0", soft: "#E7E9FD" },
  { id: "personal", label: "Personal", color: "#FF8A65", soft: "#FFEAE1" },
  { id: "home", label: "Home", color: "#A78BFA", soft: "#F1EBFE" },
  { id: "health", label: "Health", color: "#2DD4BF", soft: "#DFFBF7" },
  { id: "errands", label: "Errands", color: "#F4B942", soft: "#FDF1D6" },
];

const DURATIONS = [15, 30, 45, 60, 90];
const FOCUS_PRESETS = [15, 25, 45];
const DAY_LABELS = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];

const RECURRENCE_OPTIONS = [
  { key: "none", label: "Once" },
  { key: "daily", label: "Daily" },
  { key: "weekdays", label: "Weekdays" },
  { key: "weekly", label: "Weekly" },
  { key: "custom", label: "Custom days" },
];

/* ---------------------------------- helpers ---------------------------------- */

function pad(n) { return String(n).padStart(2, "0"); }
function dateKey(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }

function timeToMinutes(t) {
  if (!t) return null;
  const parts = t.split(":").map(Number);
  return parts[0] * 60 + parts[1];
}
function minutesToTime(mins) {
  mins = ((mins % 1440) + 1440) % 1440;
  return `${pad(Math.floor(mins / 60))}:${pad(mins % 60)}`;
}
function formatTime12(t) {
  if (!t) return "";
  const parts = t.split(":").map(Number);
  const h24 = parts[0], m = parts[1];
  const period = h24 >= 12 ? "PM" : "AM";
  let hh = h24 % 12;
  if (hh === 0) hh = 12;
  return `${hh}:${pad(m)} ${period}`;
}
function formatDayLabel(d, today) {
  if (dateKey(d) === dateKey(today)) return "Today";
  return d.toLocaleDateString(undefined, { weekday: "short" });
}
function catById(id) { return CATEGORIES.find((c) => c.id === id) || CATEGORIES[0]; }
function makeId() { return "id" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function greeting(hour) {
  if (hour < 5) return "Still up";
  if (hour < 12) return "Good morning";
  if (hour < 18) return "Good afternoon";
  return "Good evening";
}

function dayOfWeek(dateStr) { return new Date(dateStr + "T00:00:00").getDay(); }

function occursOn(task, dateKeyStr) {
  if (!task.scheduled || !task.date) return false;
  if (dateKeyStr < task.date) return false;
  if (task.skippedDates && task.skippedDates.includes(dateKeyStr)) return false;
  const rec = task.recurrence;
  if (!rec) return dateKeyStr === task.date;
  if (rec.endDate && dateKeyStr > rec.endDate) return false;
  const dow = dayOfWeek(dateKeyStr);
  if (rec.freq === "daily") return true;
  if (rec.freq === "weekdays") return dow >= 1 && dow <= 5;
  if (rec.freq === "weekly") return dow === dayOfWeek(task.date);
  if (rec.freq === "custom") return (rec.daysOfWeek || []).includes(dow);
  return false;
}

function toInstance(task, dateKeyStr) {
  return Object.assign({}, task, {
    instanceId: `${task.id}::${dateKeyStr}`,
    occurrenceDate: dateKeyStr,
    completed: (task.completedDates || []).includes(dateKeyStr),
    isPriority: (task.priorityDates || []).includes(dateKeyStr),
  });
}
function getInstancesForDate(tasks, dateKeyStr) {
  return tasks.filter((t) => occursOn(t, dateKeyStr)).map((t) => toInstance(t, dateKeyStr));
}
function recurrenceLabel(rec) {
  if (!rec) return "";
  if (rec.freq === "daily") return "Repeats daily";
  if (rec.freq === "weekdays") return "Repeats on weekdays";
  if (rec.freq === "weekly") return "Repeats weekly";
  if (rec.freq === "custom") {
    const days = (rec.daysOfWeek || []).slice().sort();
    return "Repeats on " + days.map((d) => DAY_LABELS[d]).join(", ");
  }
  return "";
}

function seedTasks() {
  const today = new Date();
  const tKey = dateKey(today);
  const tomKey = dateKey(addDays(today, 1));
  const nowMin = today.getHours() * 60 + today.getMinutes();
  return [
    { id: makeId(), title: "Reply to the proposal email", category: "work", scheduled: true, date: tKey, time: minutesToTime(nowMin + 20), duration: 30, recurrence: null, completedDates: [], priorityDates: [tKey], skippedDates: [] },
    { id: makeId(), title: "Refill water + stretch", category: "health", scheduled: true, date: tKey, time: minutesToTime(nowMin + 70), duration: 15, recurrence: { freq: "daily", daysOfWeek: [], endDate: null }, completedDates: [], priorityDates: [], skippedDates: [] },
    { id: makeId(), title: "Call to reschedule an appointment", category: "personal", scheduled: false, date: null, time: null, duration: 20, recurrence: null, completedDates: [], priorityDates: [], skippedDates: [] },
    { id: makeId(), title: "Order more coffee filters", category: "errands", scheduled: false, date: null, time: null, duration: 10, recurrence: null, completedDates: [], priorityDates: [], skippedDates: [] },
    { id: makeId(), title: "Pack bag for tomorrow", category: "home", scheduled: true, date: tomKey, time: "19:00", duration: 15, recurrence: null, completedDates: [], priorityDates: [], skippedDates: [] },
  ];
}

/* ---------------------------------- small pieces ---------------------------------- */

function Ring({ fraction = 1, size = 200, stroke = 12, color = "#5B6EF0", track = "#E7E9FD", children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - Math.max(0, Math.min(1, fraction)));
  return h("div", { className: "ring-wrap", style: { width: size, height: size } },
    h("svg", { width: size, height: size, viewBox: `0 0 ${size} ${size}` },
      h("circle", { cx: size / 2, cy: size / 2, r, fill: "none", stroke: track, strokeWidth: stroke }),
      h("circle", { cx: size / 2, cy: size / 2, r, fill: "none", stroke: color, strokeWidth: stroke, strokeDasharray: c, strokeDashoffset: offset, strokeLinecap: "round", transform: `rotate(-90 ${size / 2} ${size / 2})`, className: "ring-progress" })
    ),
    h("div", { className: "ring-center" }, children)
  );
}

function CategoryDot({ color, size = 10 }) {
  return h("span", { className: "cat-dot", style: { width: size, height: size, background: color } });
}

function CategoryPicker({ value, onChange }) {
  return h("div", { className: "cat-picker", role: "radiogroup", "aria-label": "Category" },
    CATEGORIES.map((c) => h("button", {
      key: c.id, type: "button", role: "radio", "aria-checked": value === c.id,
      className: `cat-swatch ${value === c.id ? "is-active" : ""}`,
      style: { "--sw-color": c.color, "--sw-soft": c.soft },
      onClick: () => onChange(c.id), title: c.label,
    }, h(CategoryDot, { color: c.color, size: 9 }), h("span", null, c.label)))
  );
}

function RecurrencePicker({ recurrence, onChange, anchorDate }) {
  const freq = (recurrence && recurrence.freq) || "none";
  const anchorDow = anchorDate ? dayOfWeek(anchorDate) : new Date().getDay();

  function setFreq(f) {
    if (f === "none") { onChange(null); return; }
    if (f === "custom") {
      onChange({
        freq: "custom",
        daysOfWeek: (recurrence && recurrence.daysOfWeek && recurrence.daysOfWeek.length) ? recurrence.daysOfWeek : [anchorDow],
        endDate: (recurrence && recurrence.endDate) || null,
      });
      return;
    }
    onChange({ freq: f, daysOfWeek: [], endDate: (recurrence && recurrence.endDate) || null });
  }
  function toggleDay(d) {
    const days = (recurrence && recurrence.daysOfWeek) || [];
    const next = days.includes(d) ? days.filter((x) => x !== d) : [...days, d].sort();
    onChange(Object.assign({}, recurrence || {}, { freq: "custom", daysOfWeek: next }));
  }
  function setEndDate(v) {
    if (!recurrence) return;
    onChange(Object.assign({}, recurrence, { endDate: v || null }));
  }

  const children = [
    h("div", { className: "recur-options", key: "options" },
      RECURRENCE_OPTIONS.map((o) => h("button", { key: o.key, type: "button", className: `btn btn-chip ${freq === o.key ? "is-active" : ""}`, onClick: () => setFreq(o.key) }, o.label))
    ),
  ];
  if (freq === "custom") {
    children.push(h("div", { className: "recur-days", key: "days" },
      DAY_LABELS.map((label, idx) => h("button", { key: idx, type: "button", className: `day-chip ${((recurrence && recurrence.daysOfWeek) || []).includes(idx) ? "is-active" : ""}`, onClick: () => toggleDay(idx) }, label))
    ));
  }
  if (freq === "weekly" && anchorDate) {
    children.push(h("p", { className: "recur-hint", key: "hint" }, `Repeats every ${new Date(anchorDate + "T00:00:00").toLocaleDateString(undefined, { weekday: "long" })}`));
  }
  if (freq !== "none") {
    children.push(h("label", { className: "recur-end", key: "end" },
      h("span", null, "Ends (optional)"),
      h("input", { type: "date", value: (recurrence && recurrence.endDate) || "", onChange: (e) => setEndDate(e.target.value) })
    ));
  }
  return h("div", { className: "recur-picker" }, children);
}

function QuickAddForm({ onAdd, defaultDate = null, placeholder = "What needs doing?", submitLabel = "Add", allowRecurrence = false }) {
  const [title, setTitle] = useState("");
  const [category, setCategory] = useState("work");
  const [time, setTime] = useState("");
  const [duration, setDuration] = useState(30);
  const [recurrence, setRecurrence] = useState(null);

  function handleAdd() {
    if (!title.trim()) return;
    onAdd({ title: title.trim(), category, time: time || null, duration, date: defaultDate, scheduled: !!defaultDate, recurrence: allowRecurrence && defaultDate ? recurrence : null });
    setTitle(""); setTime(""); setRecurrence(null);
  }
  function handleTitleKeyDown(e) { if (e.key === "Enter") { e.preventDefault(); handleAdd(); } }

  return h("div", { className: "quick-add" },
    h("input", { type: "text", value: title, onChange: (e) => setTitle(e.target.value), onKeyDown: handleTitleKeyDown, placeholder, className: "qa-title", "aria-label": "Task title" }),
    h("div", { className: "qa-row" }, h(CategoryPicker, { value: category, onChange: setCategory })),
    (allowRecurrence && defaultDate) ? h("div", { className: "qa-row" }, h(RecurrencePicker, { recurrence, onChange: setRecurrence, anchorDate: defaultDate })) : null,
    h("div", { className: "qa-row qa-row-meta" },
      h("input", { type: "time", value: time, onChange: (e) => setTime(e.target.value), className: "qa-input", "aria-label": "Time (optional)" }),
      h("select", { value: duration, onChange: (e) => setDuration(Number(e.target.value)), className: "qa-input", "aria-label": "Duration" },
        DURATIONS.map((d) => h("option", { key: d, value: d }, `${d} min`))
      ),
      h("button", { type: "button", className: "btn btn-primary qa-submit", onClick: handleAdd }, h(Plus, { size: 16 }), ` ${submitLabel}`)
    )
  );
}

  function handleDeleteClick() {

  return h("div", { className: `task-row ${task.completed ? "is-done" : ""}` },
    h("button", { type: "button", className: "task-check", "aria-label": task.completed ? "Mark not done" : "Mark done", onClick: () => onToggleComplete(task.instanceId) }, task.completed ? h(Check, { size: 13 }) : null),
    task.time ? h("span", { className: "task-time" }, formatTime12(task.time)) : null,
    h(CategoryDot, { color: cat.color }),
    h("span", { className: "task-title" }, task.title, isRecurring ? h(Repeat, { size: 11, className: "recur-icon", title: recurrenceLabel(task.recurrence) }) : null),

    confirmingDelete ? h("span", { className: "delete-confirm" },
      h("button", { type: "button", className: "btn btn-chip btn-sm", onClick: () => { onDeleteOccurrence(task.instanceId); setConfirmingDelete(false); } }, "Skip today"),
      h("button", { type: "button", className: "btn btn-chip btn-sm", onClick: () => { onDeleteSeries(task.id); setConfirmingDelete(false); } }, "Delete series"),

function WeekDayRow({ date, today, tasks, isOpen, onToggleOpen, onAdd, onToggleComplete, onTogglePriority, onDeleteOccurrence, onDeleteSeries }) {

    ),

function FocusPanel({ candidateTasks, onCompleteTask }) {
  const [selectedId, setSelectedId] = useState("");
  const [duration, setDuration] = useState(25);
  const [remaining, setRemaining] = useState(25 * 60);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setRemaining((r) => {
          if (r <= 1) { clearInterval(intervalRef.current); setRunning(false); setDone(true); return 0; }
          return r - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  function pickPreset(mins) { setDuration(mins); setRemaining(mins * 60); setRunning(false); setDone(false); }
  function toggleRun() { if (remaining <= 0) return; setRunning((r) => !r); setDone(false); }
  function reset() { setRunning(false); setRemaining(duration * 60); setDone(false); }
  function finishAndMark() { if (selectedId) onCompleteTask(selectedId); reset(); }

  const mm = Math.floor(remaining / 60);
  const ss = remaining % 60;
  const fraction = duration > 0 ? remaining / (duration * 60) : 0;

  return h("div", { className: "focus-panel" },
    h("div", { className: "focus-presets" },
      FOCUS_PRESETS.map((p) => h("button", { key: p, type: "button", className: `btn btn-chip ${duration === p ? "is-active" : ""}`, onClick: () => pickPreset(p) }, `${p} min`)),
      h("label", { className: "focus-custom" },
        h("input", { type: "number", min: 5, max: 180, value: duration, onChange: (e) => { const v = Number(e.target.value) || 5; setDuration(v); if (!running) setRemaining(v * 60); }, "aria-label": "Custom minutes" }),
        h("span", null, "min")
      )
    ),
    h(Ring, { fraction, size: 220, stroke: 14, color: "#5B6EF0", track: "#E7E9FD" },
      h("div", { className: "focus-time" }, `${pad(mm)}:${pad(ss)}`),
      done ? h("div", { className: "focus-done-label" }, "Nice work") : null
    ),
    h("div", { className: "focus-controls" },
      h("button", { type: "button", className: "btn btn-primary", onClick: toggleRun },
        running ? h(React.Fragment, null, h(Pause, { size: 16 }), " Pause") : h(React.Fragment, null, h(Play, { size: 16 }), ` ${remaining === duration * 60 ? "Start" : "Resume"}`)
      ),
      h("button", { type: "button", className: "btn btn-ghost", onClick: reset }, h(RotateCcw, { size: 16 }), " Reset")
    ),
    h("div", { className: "focus-link" },
      h("label", { htmlFor: "focus-task-select" }, "Working on"),
      h("select", { id: "focus-task-select", value: selectedId, onChange: (e) => setSelectedId(e.target.value) },
        h("option", { value: "" }, "Just focusing — no task linked"),
        candidateTasks.map((t) => h("option", { key: t.instanceId, value: t.instanceId }, t.title))
      ),
      (done && selectedId) ? h("button", { type: "button", className: "btn btn-success", onClick: finishAndMark }, h(Check, { size: 15 }), " Mark that task done") : null
    )
  );
}

/* ---------------------------------- main app ---------------------------------- */

function PlannerApp() {
  const [tasks, setTasks] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : seedTasks();
    } catch (e) { return seedTasks(); }
  });
  const [tab, setTab] = useState("now");
  const [now, setNow] = useState(new Date());
  const [openWeekDay, setOpenWeekDay] = useState(null);
  const [priorityNote, setPriorityNote] = useState("");

  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (e) { /* ignore */ }
  }, [tasks]);

  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(id);
  }, []);

  const todayKey = dateKey(now);
  const nowMinutes = now.getHours() * 60 + now.getMinutes();

  const todaysTasks = useMemo(() => getInstancesForDate(tasks, todayKey)
    .sort((a, b) => (timeToMinutes(a.time) ?? 9999) - (timeToMinutes(b.time) ?? 9999)), [tasks, todayKey]);

  const dumpTasks = useMemo(() => tasks.filter((t) => !t.scheduled), [tasks]);
  const completedTodayCount = todaysTasks.filter((t) => t.completed).length;
  const priorityTasks = todaysTasks.filter((t) => t.isPriority);

  const currentTask = useMemo(() => todaysTasks.find((t) => {
    if (t.completed || !t.time) return false;
    const start = timeToMinutes(t.time);
    return nowMinutes >= start && nowMinutes < start + t.duration;
  }) || null, [todaysTasks, nowMinutes]);

  const nextTask = useMemo(() => {
    if (currentTask) return null;
    return todaysTasks.find((t) => !t.completed && t.time && timeToMinutes(t.time) > nowMinutes) || null;
  }, [todaysTasks, nowMinutes, currentTask]);

  const remainingTodayTasks = todaysTasks.filter((t) =>
    t.instanceId !== (currentTask && currentTask.instanceId) && t.instanceId !== (nextTask && nextTask.instanceId) && !t.isPriority);

  const weekDays = useMemo(() => Array.from({ length: 7 }, (_, i) => addDays(now, i)), [todayKey]);

  function addTask({ title, category, time, duration, date, scheduled, recurrence }) {
    setTasks((ts) => [...ts, { id: makeId(), title, category, time, duration, date, scheduled, recurrence: scheduled ? (recurrence || null) : null, completedDates: [], priorityDates: [], skippedDates: [] }]);
  }
  function toggleComplete(instanceId) {
    const parts = instanceId.split("::"); const taskId = parts[0], occDate = parts[1];
    setTasks((ts) => ts.map((t) => {
      if (t.id !== taskId) return t;
      const has = (t.completedDates || []).includes(occDate);
      return Object.assign({}, t, { completedDates: has ? t.completedDates.filter((d) => d !== occDate) : [...(t.completedDates || []), occDate] });
    }));
  }
  function togglePriority(instanceId) {
    const parts = instanceId.split("::"); const taskId = parts[0], occDate = parts[1];
    const target = tasks.find((t) => t.id === taskId);
    if (!target) return;
    const has = (target.priorityDates || []).includes(occDate);
    if (!has) {
      const countForDate = tasks.reduce((acc, t) => acc + ((t.priorityDates || []).includes(occDate) ? 1 : 0), 0);
      if (countForDate >= 3) {
        setPriorityNote("Top 3 only — uncheck one first so today stays doable.");
        setTimeout(() => setPriorityNote(""), 3500);
        return;
      }
    }
    setTasks((ts) => ts.map((t) => t.id === taskId
      ? Object.assign({}, t, { priorityDates: has ? t.priorityDates.filter((d) => d !== occDate) : [...(t.priorityDates || []), occDate] })
      : t));
  }
  function deleteOccurrence(instanceId) {
    const parts = instanceId.split("::"); const taskId = parts[0], occDate = parts[1];
    setTasks((ts) => ts.map((t) => {
      if (t.id !== taskId) return t;
      if (!t.recurrence) return null;
      return Object.assign({}, t, { skippedDates: [...(t.skippedDates || []), occDate] });
    }).filter(Boolean));
  }
  function deleteSeries(taskId) { setTasks((ts) => ts.filter((t) => t.id !== taskId)); }
  function deleteTask(id) { setTasks((ts) => ts.filter((t) => t.id !== id)); }
  function scheduleFromDump(id, updates) { setTasks((ts) => ts.map((t) => (t.id === id ? Object.assign({}, t, updates) : t))); }
  function snoozeTask(instanceId, minutes) {
    const taskId = instanceId.split("::")[0];
    setTasks((ts) => ts.map((t) => t.id === taskId ? Object.assign({}, t, { time: minutesToTime(timeToMinutes(t.time) + minutes) }) : t));
  }

  const navItems = [
    { key: "now", label: "Right Now", icon: Sun },
    { key: "dump", label: "Brain Dump", icon: Inbox },
    { key: "week", label: "Week", icon: CalendarDays },
    { key: "focus", label: "Focus", icon: TimerIcon },
  ];

  const railNav = h("nav", { className: "rail" },
    navItems.map((item) => {
      const IconC = item.icon;
      return h("button", { key: item.key, type: "button", className: `rail-btn ${tab === item.key ? "is-active" : ""}`, onClick: () => setTab(item.key) },
        h(IconC, { size: 19 }),
        h("span", null, item.label),
        (item.key === "dump" && dumpTasks.length > 0) ? h("span", { className: "rail-badge" }, dumpTasks.length) : null
      );
    })
  );

  const header = h("header", { className: "topbar" },
    h("div", null,
      h("h1", null, greeting(now.getHours())),
      h("p", { className: "topbar-date" }, now.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" }))
    ),
    h("div", { className: "topbar-stat" }, h(Check, { size: 14 }), ` ${completedTodayCount > 0 ? `${completedTodayCount} done today` : "Fresh start today"}`)
  );

  let nowCardContent;
  if (currentTask) {
    nowCardContent = [
      h("span", { className: "now-label", key: "label" }, "Right now"),
      h(Ring, { key: "ring", fraction: (timeToMinutes(currentTask.time) + currentTask.duration - nowMinutes) / currentTask.duration, size: 210, stroke: 13, color: catById(currentTask.category).color, track: catById(currentTask.category).soft },
        h("div", { className: "now-ring-time" }, `${Math.max(0, timeToMinutes(currentTask.time) + currentTask.duration - nowMinutes)}m`),
        h("div", { className: "now-ring-sub" }, "left")
      ),
      h("h2", { className: "now-title", key: "title" }, currentTask.title),
      h("p", { className: "now-meta", key: "meta" }, `${formatTime12(currentTask.time)} · ${currentTask.duration} min · ${catById(currentTask.category).label}`),
      h("div", { className: "now-actions", key: "actions" },
        h("button", { className: "btn btn-primary", onClick: () => toggleComplete(currentTask.instanceId) }, h(Check, { size: 16 }), " Mark done"),
        h("button", { className: "btn btn-ghost", onClick: () => snoozeTask(currentTask.instanceId, 15) }, h(Clock, { size: 16 }), " Push 15 min")
      )
    ];
  } else if (nextTask) {
    nowCardContent = [
      h("span", { className: "now-label", key: "label" }, "Up next"),
      h(Ring, { key: "ring", fraction: 1, size: 210, stroke: 13, color: catById(nextTask.category).soft, track: catById(nextTask.category).soft },
        h("div", { className: "now-ring-time" }, `${Math.max(0, timeToMinutes(nextTask.time) - nowMinutes)}m`),
        h("div", { className: "now-ring-sub" }, "to go")
      ),
      h("h2", { className: "now-title", key: "title" }, nextTask.title),
      h("p", { className: "now-meta", key: "meta" }, `${formatTime12(nextTask.time)} · ${nextTask.duration} min · ${catById(nextTask.category).label}`),
      h("div", { className: "now-actions", key: "actions" },
        h("button", { className: "btn btn-ghost", onClick: () => toggleComplete(nextTask.instanceId) }, h(Check, { size: 16 }), " Mark done"),
        h("button", { className: "btn btn-ghost", onClick: () => snoozeTask(nextTask.instanceId, 15) }, h(Clock, { size: 16 }), " Push 15 min")
      )
    ];
  } else {
    nowCardContent = [
      h("div", { className: "now-empty", key: "empty" },
        h("span", { className: "now-label" }, "Right now"),
        h("p", { className: "now-empty-text" }, "Nothing on deck. Nice and clear."),
        h("p", { className: "now-empty-sub" }, "Add something below, or dig through your brain dump.")
      )
    ];
  }

  const nowView = h("section", { className: "view view-now" },
    h("div", { className: "now-card" }, nowCardContent),
    h("div", { className: "now-priorities" },
      h("div", { className: "section-head" },
        h("h3", null, "Today's top 3"),
        priorityNote ? h("span", { className: "priority-note" }, priorityNote) : null
      ),
      priorityTasks.length === 0 ? h("p", { className: "muted" }, "Star up to three tasks below to keep today doable.") : null,
      h("div", { className: "priority-list" },
        priorityTasks.map((t) => h(TaskRow, { key: t.instanceId, task: t, onToggleComplete: toggleComplete, onTogglePriority: togglePriority, onDeleteOccurrence: deleteOccurrence, onDeleteSeries: deleteSeries }))
      )
    ),
    h("div", { className: "now-timeline" },
      h("h3", null, "Rest of today"),
      remainingTodayTasks.length === 0 ? h("p", { className: "muted" }, "Nothing else scheduled.") : null,
      h("div", { className: "task-list" },
        remainingTodayTasks.map((t) => h(TaskRow, { key: t.instanceId, task: t, onToggleComplete: toggleComplete, onTogglePriority: togglePriority, onDeleteOccurrence: deleteOccurrence, onDeleteSeries: deleteSeries }))
      ),
      h(QuickAddForm, { onAdd: addTask, defaultDate: todayKey, placeholder: "Add something for today…", submitLabel: "Add to today", allowRecurrence: true })
    )
  );

  const dumpView = h("section", { className: "view view-dump" },
    h("p", { className: "view-intro" }, "Toss anything in here the moment it crosses your mind. Sort it out later — that's what this is for."),
    h(QuickAddForm, { onAdd: addTask, defaultDate: null, placeholder: "What's on your mind?", submitLabel: "Toss it in" }),
    h("div", { className: "dump-list" },
      dumpTasks.length === 0 ? h("p", { className: "muted" }, "Your brain dump is empty. That's a good place to be.") : null,
      dumpTasks.map((t) => h(BrainDumpItem, { key: t.id, task: t, todayKey, onSchedule: scheduleFromDump, onDelete: deleteTask }))
    )
  );

  const weekView = h("section", { className: "view view-week" },
    h("div", { className: "week-list" },
      weekDays.map((d) => {
        const key = dateKey(d);
        const dayTasks = getInstancesForDate(tasks, key).sort((a, b) => (timeToMinutes(a.time) ?? 9999) - (timeToMinutes(b.time) ?? 9999));
        return h(WeekDayRow, {
          key, date: d, today: now, tasks: dayTasks,
          isOpen: openWeekDay === key,
          onToggleOpen: (k) => setOpenWeekDay((o) => (o === k ? null : k)),
          onAdd: (payload) => { addTask(payload); setOpenWeekDay(null); },
          onToggleComplete: toggleComplete, onTogglePriority: togglePriority,
          onDeleteOccurrence: deleteOccurrence, onDeleteSeries: deleteSeries
        });
      })
    )
  );

  const focusView = h("section", { className: "view view-focus" },
    h(FocusPanel, { candidateTasks: todaysTasks.filter((t) => !t.completed), onCompleteTask: toggleComplete })
  );

  let activeView;
  if (tab === "now") activeView = nowView;
  else if (tab === "dump") activeView = dumpView;
  else if (tab === "week") activeView = weekView;
  else activeView = focusView;

  return h("div", { className: "app" },
    railNav,
    h("main", { className: "main" }, header, activeView)
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(h(PlannerApp));
</script>
</body>
</html>
