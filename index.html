<!DOCTYPE html>
<html>
<head>
  <title>Secret Club</title>
</head>
<body>

  <!-- Notice we removed the onclick attribute from the button -->
  <div style="text-align: center; margin-top: 100px;">
    <h2>🔒 This site is locked</h2>
    <input type="password" id="password-field" placeholder="Enter Secret Password">
    <button id="unlock-btn">Unlock</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";

  <!-- This connects your site to Firebase -->
  <script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";

    // 🔴 PASTE YOUR FIREBASE SNIPPET HERE
    const firebaseConfig = {
      apiKey: "AIzaSyCAF_cHf9Iz63pz2aJ4fPeulHUrKYJmfm0",
      authDomain: "planner-b2509.firebaseapp.com",
      projectId: "planner-b2509"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // This grabs the button from your HTML page using its ID
    const unlockButton = document.getElementById('unlock-btn');

    // This listens for the click directly inside the module
    unlockButton.addEventListener('click', () => {
      const password = document.getElementById('password-field').value;
      
      alert("Checking password with the guard...");

      signInWithEmailAndPassword(auth, "clubhouse@secret.com", password)
        .then(() => {
          alert("Success! Opening the door...");
          window.location.href = "secret.html";
        })
        .catch((error) => {
          alert("Firebase Error: " + error.code + " - " + error.message);
        });
    });
  </script>
</body>
</html>
